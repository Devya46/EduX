<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradeMaster · Learn Stock Market</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .body-hero {
        background: #05070c;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ----- HERO (full viewport, no overflow) ----- */
      .full-width-hero {
        position: relative;
        width: 100vw;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #05070c;
      }

      .full-width-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 40%,
          rgba(0, 20, 10, 0.2) 0%,
          rgba(0, 0, 0, 0.55) 100%
        );
        z-index: 3;
        pointer-events: none;
        opacity: 0.7;
        animation: vignettePulse 2.2s ease-out forwards;
      }

      @keyframes vignettePulse {
        0% {
          opacity: 0.9;
          background: radial-gradient(
            circle at 50% 40%,
            rgba(0, 0, 0, 0.5) 0%,
            #000000cc 100%
          );
        }
        100% {
          opacity: 0.7;
          background: radial-gradient(
            circle at 50% 40%,
            rgba(0, 30, 15, 0.2) 0%,
            rgba(0, 0, 0, 0.55) 100%
          );
        }
      }

      .hero-background-svg {
        position: absolute;
        top: -100px;
        left: 0;
        width: 100%;
        height: 120%;
        z-index: 0;
        pointer-events: none;
      }

      .bg-svg-element {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .grain-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.12;
        mix-blend-mode: overlay;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.4"/></svg>');
        background-repeat: repeat;
      }

      .text-contrast-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          125deg,
          rgba(0, 0, 0, 0.38) 0%,
          rgba(0, 0, 0, 0.12) 45%,
          rgba(0, 0, 0, 0.48) 100%
        );
        z-index: 2;
        pointer-events: none;
      }

      .hero-content {
        position: relative;
        z-index: 15;
        max-width: 1280px;
        width: 90%;
        margin: 0 auto;
        padding: 4rem 2rem;
        text-align: center;
      }

      .hero-logo-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 2rem;
        animation: logoEmergence 0.9s cubic-bezier(0.21, 0.98, 0.35, 1.2)
          forwards;
        transform-origin: center;
      }

      .hero-logo-wrapper img {
        width: 34rem;
        max-width: 85%;
        filter: drop-shadow(0 15px 20px rgba(0, 0, 0, 0.3));
      }

      @keyframes logoEmergence {
        0% {
          opacity: 0;
          transform: scale(0.45);
          filter: blur(8px);
        }
        40% {
          opacity: 0.7;
          transform: scale(1.02);
          filter: blur(0px);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: blur(0px);
        }
      }

      .hero-title {
        font-size: clamp(2.6rem, 8vw, 3.4rem);
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.02em;
        background: white;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 0 2px 15px rgba(0, 0, 0, 0.25);
        margin-bottom: 1.4rem;
        animation: titleSlideUp 0.9s ease-out 0.2s forwards;
        opacity: 0;
        transform: translateY(35px);
      }

      @keyframes titleSlideUp {
        0% {
          opacity: 0;
          transform: translateY(35px) scale(0.97);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .hero-subtitle {
        color: rgba(255, 255, 245, 0.92);
        font-size: 1.2rem;
        letter-spacing: 0.3px;
        margin-bottom: 2rem;
        font-weight: 450;
        backdrop-filter: blur(4px);
        animation: fadeInUp 0.8s ease 0.35s forwards;
        opacity: 0;
        transform: translateY(24px);
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .cta-group {
        display: flex;
        flex-wrap: wrap;
        gap: 1.4rem;
        justify-content: center;
        margin-top: 0.5rem;
        animation: fadeInUp 0.8s ease 0.65s forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 600;
        font-size: 1.05rem;
        padding: 0.9rem 2.3rem;
        border-radius: 60px;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.2, 0.85, 0.4, 1);
        cursor: pointer;
        border: none;
        letter-spacing: -0.2px;
        position: relative;
        overflow: hidden;
      }

      .btn-primary {
        background: linear-gradient(115deg, #0d8a2f, #005c0a, #d4af37);
        color: white;
        font-weight: 700;
        border: 1px solid rgba(255, 215, 0, 0.4);
        box-shadow: 0 12px 28px rgba(0, 80, 20, 0.5);
      }

      .btn-primary::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 70%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 200, 0.4),
          transparent
        );
        transition: 0.6s;
      }

      .btn-primary:hover::before {
        left: 150%;
      }

      .btn-primary:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 20px 35px rgba(212, 175, 55, 0.5);
      }

      .btn-secondary {
        background: rgba(20, 28, 40, 0.75);
        backdrop-filter: blur(8px);
        border: 1.5px solid #0d8a2f;
        color: #e6ffe6;
      }

      .btn-secondary:hover {
        background: #0d8a2f;
        color: #fff;
        border-color: #ffe484;
        transform: translateY(-2px);
      }

      .trust-row {
        margin-top: 3rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2rem;
        font-size: 0.9rem;
        font-weight: 500;
        color: #cddcff;
        animation: fadeInUp 0.8s ease 0.8s forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .trust-item {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        padding: 0.45rem 1.2rem;
        border-radius: 60px;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: #2ecc71;
        border-radius: 50%;
        box-shadow: 0 0 6px #48ff9e;
        animation: pulseDot 1.6s infinite;
      }

      @keyframes pulseDot {
        0% {
          opacity: 0.6;
          transform: scale(0.8);
        }
        100% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      @media (max-width: 780px) {
        .hero-subtitle {
          font-size: 1rem;
        }
        .btn {
          padding: 0.7rem 1.5rem;
          font-size: 0.9rem;
        }
        .trust-item {
          font-size: 0.75rem;
          padding: 0.25rem 0.9rem;
          gap: 6px;
        }
      }

      @media (max-width: 480px) {
        .hero-content {
          padding: 2rem 1rem;
        }
        .hero-title {
          font-size: clamp(2rem, 10vw, 2.6rem);
          margin-top: 0;
        }
        .hero-logo-wrapper img {
          max-width: 70%;
        }
      }
    </style>
  </head>
  <body>
    <div class="body-hero">
      <section class="full-width-hero" id="heroSection">
        <div class="hero-background-svg">
          <svg
            class="bg-svg-element"
            viewBox="0 0 340 367"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            preserveAspectRatio="xMidYMid slice"
          >
            <defs>
              <linearGradient
                id="paint0_linear_95_17353_full"
                x1="170"
                y1="0"
                x2="170"
                y2="366.164"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0.5" stop-color="#1B1B1B" />
                <stop offset="1" stop-color="#000000" />
              </linearGradient>
            </defs>
            <path
              d="M20.1533 260.653C23.0064 259.832 25.8513 261.974 25.8516 264.942V355.147C25.8516 358.132 23.876 360.757 21.0078 361.582L5.69824 365.987C2.84502 366.808 4.48653e-05 364.667 0 361.698V271.493C7.10189e-05 268.509 1.97557 265.884 4.84375 265.059L20.1533 260.653ZM82.5264 172.7C85.3796 171.879 88.2246 174.021 88.2246 176.99V352.774C88.2244 355.759 86.2489 358.383 83.3809 359.208L68.0713 363.614C65.218 364.435 62.373 362.293 62.373 359.324V183.54C62.3731 180.556 64.3487 177.932 67.2168 177.106L82.5264 172.7ZM51.2783 233.13C54.1316 232.309 56.9766 234.451 56.9766 237.42V327.624C56.9766 330.609 55.001 333.233 52.1328 334.059L36.8232 338.464C33.97 339.285 31.125 337.144 31.125 334.175V243.97C31.1251 240.985 33.1007 238.362 35.9688 237.536L51.2783 233.13ZM113.771 203.931C116.624 203.11 119.469 205.252 119.469 208.221V317.396C119.469 320.38 117.493 323.004 114.625 323.829L99.3154 328.235C96.4622 329.056 93.6172 326.914 93.6172 323.945V214.771C93.6173 211.786 95.5928 209.162 98.4609 208.337L113.771 203.931ZM176.255 183.06C179.108 182.239 181.953 184.381 181.953 187.35V296.524C181.953 299.509 179.977 302.133 177.109 302.958L161.8 307.364C158.947 308.185 156.102 306.043 156.102 303.074V193.899C156.102 190.915 158.077 188.291 160.945 187.466L176.255 183.06ZM207.692 163.013C210.546 162.192 213.391 164.334 213.391 167.303V295.075C213.391 298.06 211.415 300.684 208.547 301.51L193.237 305.916C190.384 306.737 187.539 304.595 187.539 301.626V173.853C187.539 170.868 189.515 168.244 192.383 167.419L207.692 163.013ZM145.015 190.06C147.868 189.239 150.713 191.381 150.713 194.35V284.554C150.713 287.538 148.737 290.163 145.869 290.988L130.56 295.394C127.706 296.215 124.861 294.074 124.861 291.105V200.899C124.861 197.915 126.837 195.291 129.705 194.466L145.015 190.06ZM270.739 163.314C273.592 162.492 276.438 164.635 276.438 167.604V257.808C276.438 260.792 274.462 263.417 271.594 264.242L256.284 268.647C253.431 269.469 250.586 267.327 250.586 264.358V174.153C250.586 171.169 252.562 168.545 255.43 167.72L270.739 163.314ZM239.122 134.177C241.975 133.356 244.82 135.498 244.82 138.467V247.642C244.82 250.626 242.845 253.25 239.977 254.075L224.667 258.481C221.814 259.303 218.969 257.16 218.969 254.191V145.017C218.969 142.032 220.944 139.408 223.812 138.583L239.122 134.177ZM302.356 69.6338C305.21 68.8127 308.055 70.9548 308.055 73.9239V188.222C308.055 191.206 306.079 193.831 303.211 194.656L287.901 199.062C285.048 199.883 282.203 197.741 282.203 194.772V80.4737C282.203 77.4892 284.179 74.8655 287.047 74.0401L302.356 69.6338ZM334.302 0.176793C337.155 -0.644285 340 1.4978 340 4.46683V118.765C340 121.749 338.024 124.374 335.156 125.199L319.847 129.605C316.994 130.426 314.149 128.284 314.148 125.315V11.0166C314.148 8.03212 316.124 5.40847 318.992 4.58304L334.302 0.176793Z"
              fill="url(#paint0_linear_95_17353_full)"
            />
          </svg>
        </div>
        <div class="grain-overlay"></div>
        <div class="text-contrast-overlay"></div>
        <div class="hero-content">
          <div class="hero-logo-wrapper">
            <img
              src="images/Islamic_trade-removebg-preview.png"
              alt="TradeMaster pro logo"
              onerror="
                this.src =
                  'https://placehold.co/800x200/1a2a3a/FFFFFF?text=Trade+Elite'
              "
            />
          </div>
          <h1 class="hero-title">
            Learn the Stock Market Like <br />
            a Professional
          </h1>
          <p class="hero-subtitle">
            Expert-led trading education, market analysis, and<br />
            practical strategies to help you trade with confidence.
          </p>
          <div class="cta-group">
            <a href="#" class="btn btn-primary"
              >Start now <i class="fa-solid fa-arrow-right"></i
            ></a>
            <a href="#" class="btn btn-secondary"
              >Learn more <i class="fa-solid fa-caret-right"></i
            ></a>
          </div>
          <div class="trust-row">
            <span class="trust-item"><i class="dot"></i> Zero commission</span>
            <span class="trust-item"
              ><i class="dot"></i> Real-time signals</span
            >
            <span class="trust-item"><i class="dot"></i> Smart analytics</span>
            <span class="trust-item"
              ><i class="dot"></i> 24/7 dedicated support</span
            >
          </div>
        </div>
      </section>
    </div>

    <script>
      (function () {
        // replay hero entrance animations when section comes into view
        const heroSection = document.getElementById("heroSection");
        const heroLogo = document.querySelector(".hero-logo-wrapper");
        const title = document.querySelector(".hero-title");
        const subtitle = document.querySelector(".hero-subtitle");
        const cta = document.querySelector(".cta-group");
        const trust = document.querySelector(".trust-row");

        function replayHeroAnim() {
          if (!heroLogo) return;
          const elements = [heroLogo, title, subtitle, cta, trust];
          elements.forEach((el) => {
            if (el) el.style.animation = "none";
          });
          void heroLogo.offsetHeight;
          if (heroLogo)
            heroLogo.style.animation =
              "logoEmergence 0.9s cubic-bezier(0.21, 0.98, 0.35, 1.2) forwards";
          if (title) {
            title.style.animation = "titleSlideUp 0.9s ease-out 0.2s forwards";
            title.style.opacity = "0";
            title.style.transform = "translateY(35px)";
          }
          if (subtitle) {
            subtitle.style.animation = "fadeInUp 0.8s ease 0.35s forwards";
            subtitle.style.opacity = "0";
            subtitle.style.transform = "translateY(24px)";
          }
          if (cta) {
            cta.style.animation = "fadeInUp 0.8s ease 0.65s forwards";
            cta.style.opacity = "0";
            cta.style.transform = "translateY(20px)";
          }
          if (trust) {
            trust.style.animation = "fadeInUp 0.8s ease 0.8s forwards";
            trust.style.opacity = "0";
            trust.style.transform = "translateY(20px)";
          }
        }

        const observerHero = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) replayHeroAnim();
            });
          },
          { threshold: 0.3 },
        );
        if (heroSection) observerHero.observe(heroSection);

        // prevent default on empty links
        document.querySelectorAll('a[href="#"]').forEach((link) => {
          link.addEventListener("click", (e) => e.preventDefault());
        });
      })();
    </script>
  </body>
</html>
