<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Hand | Full Width</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ————— RESET & BASE ————— */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #000000;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ————— FULL-WIDTH SECTION ————— */
      .full-section {
        width: 100%;
        min-height: 100vh;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        position: relative;
        overflow: hidden;
      }

      /* Subtle ambient glow behind the image */
      .full-section::before {
        content: "";
        position: absolute;
        width: 70%;
        max-width: 800px;
        aspect-ratio: 1/1;
        background: radial-gradient(
          circle,
          rgba(0, 120, 255, 0.08),
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: ambientPulse 6s ease-in-out infinite alternate;
      }

      /* ——— IMAGE WRAPPER ——— */
      .image-wrapper {
        width: 100%;
        max-width: 900px;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px;
        position: relative;
        z-index: 2;
      }

      .hand-image {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
        max-height: 150vh;

        /* ——— ANIMATION: floating + glow ——— */
        /* animation: floatGlow 5.5s ease-in-out infinite; */
        /* filter: drop-shadow(0 20px 60px rgba(0, 100, 255, 0.15)); */
        transition: filter 0.4s ease;
      }

      /* ——— TEXT CONTENT (clean, minimal) ——— */
      .text-content {
        text-align: center;
        margin-top: -18.5rem;
        position: relative;
        z-index: 2;
        max-width: 700px;
      }

      .badge {
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0.4rem 1.4rem;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(4px);
        animation: fadeUp 0.9s ease-out both;
      }

      h1 {
        font-size: clamp(2.4rem, 8vw, 4.8rem);
        font-weight: 700;
        line-height: 1.1;
        margin-top: 1rem;
        color: #ffffff;
        letter-spacing: -0.02em;
        animation: fadeUp 0.9s ease-out 0.08s both;
      }

      h1 span {
        background: linear-gradient(135deg, #ffffff, #6ab0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .sub-text {
        font-size: 1.1rem;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 0.8rem;
        line-height: 1.6;
        animation: fadeUp 0.9s ease-out 0.16s both;
      }

      .cta {
        margin-top: 2rem;
        display: inline-block;
        font-weight: 600;
        font-size: 1rem;
        color: #ffffff;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 0.9rem 2.8rem;
        border-radius: 60px;
        cursor: pointer;
        transition: all 0.3s ease;
        animation: fadeUp 0.9s ease-out 0.24s both;
        text-decoration: none;
        letter-spacing: 0.02em;
      }

      .cta:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(0, 100, 255, 0.15);
      }

      /* ——— KEYFRAMES ——— */

      @keyframes floatGlow {
        0% {
          transform: translateY(0px) scale(1);
          filter: drop-shadow(0 20px 50px rgba(0, 100, 255, 0.1));
        }
        50% {
          transform: translateY(-20px) scale(1.01);
          filter: drop-shadow(0 40px 80px rgba(0, 120, 255, 0.3));
        }
        100% {
          transform: translateY(0px) scale(1);
          filter: drop-shadow(0 20px 50px rgba(0, 100, 255, 0.1));
        }
      }

      @keyframes ambientPulse {
        0% {
          opacity: 0.4;
          transform: translate(-50%, -50%) scale(0.9);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.3);
        }
      }

      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ——— RESPONSIVE ——— */
      @media (max-width: 768px) {
        .full-section {
          padding: 1.5rem 1rem;
        }
        .hand-image {
          max-height: 50vh;
        }
        .text-content {
          margin-top: 1.8rem;
        }
        .sub-text {
          font-size: 1rem;
        }
        .cta {
          padding: 0.75rem 2rem;
          font-size: 0.95rem;
        }
      }

      @media (max-width: 480px) {
        .hand-image {
          max-height: 40vh;
        }
        .badge {
          font-size: 0.65rem;
          padding: 0.3rem 1rem;
        }
        .sub-text {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <section class="full-section">
      <!-- Image -->
      <div class="image-wrapper">
        <img
          src="https://cfcdn.olymptrade.com/s6/v1.0.49/zeus/assets/hand.B8DUGbiV_1B7lqQ.avif"
          alt="Trading hand"
          class="hand-image"
          loading="lazy"
        />
      </div>

      <!-- Text -->
      <div class="text-content">
        <span class="badge">⚡ Next‑Gen Trading</span>
        <h1>Move with <span>certainty</span></h1>
        <p class="sub-text">
          Real‑time signals, clean interface.<br />No clutter. Just results.
        </p>
        <button class="cta">Explore →</button>
      </div>
    </section>
  </body>
</html>
