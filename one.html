<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>Stock Reel · full-width cards</title>
    <!-- Font Awesome (icons only) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }

      body {
        background: #0b0b0b;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        color: #fff;
      }

      .app {
        width: 100%;
        max-width: 1600px;
        background: #0b0b0b;
        padding: 2rem 0 3rem;
        margin: 0 auto;
      }

      /* header – clean, glowing accent */
      .header {
        text-align: center;
        margin-bottom: 2.2rem;
        padding: 0 1rem;
      }

      .header h1 {
        font-size: 2.8rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #f6b44a, #fad974);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.6rem;
      }

      .header .sub {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1.8rem 3.5rem;
        margin-top: 0.6rem;
        font-size: 1.05rem;
        font-weight: 300;
        color: #d0d0d0;
      }

      .header .sub span {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .header .sub i {
        color: #f6b44a;
        font-size: 1.3rem;
        width: 2rem;
        text-align: center;
      }

      .header .sub strong {
        color: #fff;
        font-weight: 600;
      }

      /* ----- FULL WIDTH SCROLL SECTION – no side padding, clean cards ----- */
      .scroll-section {
        background: transparent;
        padding: 0;
        margin: 0;
        width: 100%;
        overflow: hidden;
        position: relative;
      }

      /* horizontal scroll wrapper – hide scrollbar, full width */
      .scroll-wrapper {
        display: flex;
        gap: 1.8rem;
        overflow-x: auto;
        padding: 0.8rem 1.5rem 1.8rem 1.5rem;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        cursor: grab;
        scrollbar-width: none;
        -ms-overflow-style: none;
        width: 100%;
      }

      .scroll-wrapper::-webkit-scrollbar {
        display: none;
      }

      /* video card – refined, with subtle border & glassy feel */
      .video-card {
        flex: 0 0 280px;
        width: 280px;
        background: #141414;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(255, 215, 100, 0.12);
        transition:
          transform 0.25s ease,
          box-shadow 0.3s ease,
          border-color 0.2s;
        position: relative;
        touch-action: pan-y;
        backdrop-filter: blur(2px);
      }

      .video-card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
        border-color: rgba(246, 180, 74, 0.5);
      }

      /* video container – 16:9, rounded top */
      .video-container {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        background: #0a0a0a;
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        cursor: pointer;
      }

      /* preview image – covers the container */
      .video-container .preview-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
        transition: opacity 0.3s ease;
        background: #111;
      }

      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        opacity: 0;
      }

      /* when playing, hide preview & show iframe */
      .video-card.playing .preview-img {
        opacity: 0;
      }
      .video-card.playing iframe {
        opacity: 1;
      }

      /* play overlay – icon with glow */
      .video-container .play-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.25);
        transition: opacity 0.3s;
        z-index: 2;
      }

      .video-container .play-overlay i {
        font-size: 4.6rem;
        color: #fff;
        text-shadow:
          0 4px 24px rgba(0, 0, 0, 0.9),
          0 0 20px rgba(246, 180, 74, 0.5);
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
      }

      .video-card.playing .play-overlay {
        opacity: 0;
        pointer-events: none;
      }

      /* meta below video – card footer */
      .video-meta {
        padding: 0.9rem 1rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #141414;
        border-radius: 0 0 20px 20px;
        border-top: 1px solid rgba(255, 215, 100, 0.08);
      }

      .video-meta .title {
        font-weight: 600;
        color: #f0f0f0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 68%;
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .video-meta .title i {
        color: #f6b44a;
        font-size: 0.9rem;
      }

      .video-meta .stats {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        color: #aaa;
      }

      .video-meta .stats i {
        color: #f6b44a;
        margin-right: 2px;
      }

      /* ----- MODAL (full video popup) – sleek ----- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.93);
        backdrop-filter: blur(6px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 1.5rem;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-box {
        background: #111;
        max-width: 960px;
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.95);
        border: 1px solid rgba(246, 180, 74, 0.2);
        animation: modalFade 0.2s ease;
      }

      @keyframes modalFade {
        0% {
          opacity: 0.5;
          transform: scale(0.96);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .modal-box .modal-video-wrap {
        position: relative;
        padding-top: 56.25%;
        background: #000;
      }

      .modal-box .modal-video-wrap iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .modal-close {
        position: absolute;
        top: 16px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 1.8rem;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        backdrop-filter: blur(4px);
        transition:
          background 0.2s,
          transform 0.15s;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-close:hover {
        background: #f6b44a;
        color: #0b0b0b;
        transform: rotate(90deg);
        border-color: #f6b44a;
      }

      .modal-box .modal-info {
        padding: 1.4rem 2rem 2rem;
        background: #111;
        color: #ccc;
      }

      .modal-box .modal-info h3 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 600;
        margin-bottom: 0.2rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .modal-box .modal-info h3 i {
        color: #f6b44a;
        font-size: 1.4rem;
      }

      .modal-box .modal-info p {
        color: #aaa;
        font-size: 1rem;
        margin-top: 0.3rem;
      }

      /* ----- RESPONSIVE – cards adapt ----- */
      @media (max-width: 768px) {
        .header h1 {
          font-size: 2.2rem;
        }
        .header .sub {
          gap: 0.8rem 2rem;
          font-size: 0.9rem;
        }
        .video-card {
          flex: 0 0 220px;
          width: 220px;
        }
        .scroll-wrapper {
          gap: 1.2rem;
          padding: 0.5rem 1rem 1.2rem;
        }
        .video-container .play-overlay i {
          font-size: 3.6rem;
        }
      }

      @media (max-width: 480px) {
        .header h1 {
          font-size: 1.7rem;
        }
        .header .sub {
          gap: 0.4rem 1.2rem;
          font-size: 0.75rem;
        }
        .video-card {
          flex: 0 0 170px;
          width: 170px;
        }
        .scroll-wrapper {
          gap: 1rem;
          padding: 0.3rem 0.8rem 1rem;
        }
        .video-container .play-overlay i {
          font-size: 2.8rem;
        }
        .modal-box .modal-info h3 {
          font-size: 1.2rem;
        }
        .modal-close {
          width: 40px;
          height: 40px;
          font-size: 1.4rem;
        }
        .video-meta .title {
          font-size: 0.75rem;
        }
        .video-meta .stats {
          font-size: 0.7rem;
        }
      }

      @media (max-width: 380px) {
        .video-card {
          flex: 0 0 140px;
          width: 140px;
        }
        .scroll-wrapper {
          gap: 0.7rem;
          padding: 0.2rem 0.5rem 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- HEADER with stats (icons) -->
      <div class="header">
        <h1>Trusted by Millions of Traders</h1>
        <div class="sub">
          <span
            ><i class="fas fa-user-tie"></i> <strong>3.5K+</strong> Customers
            worldwide</span
          >
          <span
            ><i class="fas fa-award"></i> <strong>$5K+</strong> Paid in
            rewards</span
          >
          <span
            ><i class="fas fa-globe"></i> <strong>10+</strong> Countries
            served</span
          >
        </div>
      </div>

      <!-- FULL-WIDTH SCROLL SECTION – no border, cards inside -->
      <div class="scroll-section">
        <div class="scroll-wrapper" id="scrollWrapper">
          <!-- video cards injected by JS -->
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <button class="modal-close" id="modalCloseBtn">
          <i class="fas fa-times"></i>
        </button>
        <div class="modal-video-wrap">
          <iframe
            id="modalIframe"
            src=""
            allow="autoplay; encrypted-media"
            allowfullscreen
          ></iframe>
        </div>
        <div class="modal-info">
          <h3>
            <i class="fas fa-chart-line"></i>
            <span id="modalTitle">Stock video</span>
          </h3>
          <p id="modalDesc">Trading · markets · worldwide</p>
        </div>
      </div>
    </div>

    <script>
      (function () {
        // ----- 10 stock/trading videos with preview images -----
        const videoData = [
          {
            id: "dQw4w9WgXcQ",
            title: "Market momentum",
            views: "14K",
            preview:
              "https://images.pexels.com/photos/5849595/pexels-photo-5849595.jpeg",
          },
          {
            id: "jNQXAC9IVRw",
            title: "Scalping strategy",
            views: "8.2K",
            preview:
              "https://images.pexels.com/photos/8369835/pexels-photo-8369835.jpeg",
          },
          {
            id: "9bZkp7q19f0",
            title: "Risk management",
            views: "11K",
            preview:
              "https://images.pexels.com/photos/5849595/pexels-photo-5849595.jpeg",
          },
          {
            id: "kJQP7kiw5Fk",
            title: "Breakout patterns",
            views: "9.5K",
            preview:
              "https://images.pexels.com/photos/8369835/pexels-photo-8369835.jpeg",
          },
          {
            id: "fJ9rUzIMcZQ",
            title: "Forex & crypto",
            views: "6.7K",
            preview:
              "https://images.pexels.com/photos/5849595/pexels-photo-5849595.jpeg",
          },
          {
            id: "tgbNymZ7vqY",
            title: "Trading psychology",
            views: "7.3K",
            preview:
              "https://images.pexels.com/photos/8369835/pexels-photo-8369835.jpeg",
          },
          {
            id: "CevxZvSJLk8",
            title: "High impact news",
            views: "12K",
            preview:
              "https://images.pexels.com/photos/5849595/pexels-photo-5849595.jpeg",
          },
          {
            id: "RgKAFK5djSk",
            title: "Reversal setup",
            views: "5.8K",
            preview:
              "https://images.pexels.com/photos/8369835/pexels-photo-8369835.jpeg",
          },
          {
            id: "e-ORhEE9VVg",
            title: "Trend following",
            views: "10.1K",
            preview:
              "https://images.pexels.com/photos/5849595/pexels-photo-5849595.jpeg",
          },
          {
            id: "YQHsXMglC9A",
            title: "Weekly recap",
            views: "15K",
            preview:
              "https://images.pexels.com/photos/8369835/pexels-photo-8369835.jpeg",
          },
        ];

        // Duplicate 3 times for infinite seamless loop (30 items)
        const loopCount = 3;
        const allVideos = [];
        for (let i = 0; i < loopCount; i++) {
          videoData.forEach((v) =>
            allVideos.push({ ...v, key: `${v.id}-${i}` }),
          );
        }

        const wrapper = document.getElementById("scrollWrapper");
        let scrollInterval = null;
        let isHovering = false;

        // ----- build video cards (full width, cards) -----
        function buildCards() {
          wrapper.innerHTML = "";
          allVideos.forEach((video) => {
            const card = document.createElement("div");
            card.className = "video-card";
            card.dataset.videoId = video.id;
            card.dataset.title = video.title;
            card.dataset.views = video.views;

            const container = document.createElement("div");
            container.className = "video-container";

            // --- preview image ---
            const img = document.createElement("img");
            img.className = "preview-img";
            img.src = video.preview;
            img.alt = video.title;
            img.loading = "lazy";

            // --- iframe (hidden initially) ---
            const iframe = document.createElement("iframe");
            iframe.src = `https://www.youtube.com/embed/${video.id}?enablejsapi=1&rel=0&showinfo=0&autoplay=0&mute=1&controls=0&modestbranding=1`;
            iframe.allow = "autoplay; encrypted-media";
            iframe.allowFullscreen = true;
            iframe.loading = "lazy";

            // --- play overlay ---
            const overlay = document.createElement("div");
            overlay.className = "play-overlay";
            overlay.innerHTML = '<i class="fas fa-play-circle"></i>';

            container.appendChild(img);
            container.appendChild(iframe);
            container.appendChild(overlay);
            card.appendChild(container);

            // meta footer
            const meta = document.createElement("div");
            meta.className = "video-meta";
            meta.innerHTML = `
          <span class="title"><i class="fas fa-chart-line"></i>${video.title}</span>
          <span class="stats"><i class="fas fa-eye"></i> ${video.views}</span>
        `;
            card.appendChild(meta);

            // --- hover: autoplay (muted) + hide preview ---
            card.addEventListener("mouseenter", function (e) {
              pauseScroll(true);
              const iframeEl = this.querySelector("iframe");
              if (iframeEl) {
                const vid = this.dataset.videoId;
                iframeEl.src = `https://www.youtube.com/embed/${vid}?enablejsapi=1&rel=0&showinfo=0&autoplay=1&mute=1&controls=0&modestbranding=1`;
                this.classList.add("playing");
              }
            });

            card.addEventListener("mouseleave", function (e) {
              pauseScroll(false);
              const iframeEl = this.querySelector("iframe");
              if (iframeEl) {
                const vid = this.dataset.videoId;
                iframeEl.src = `https://www.youtube.com/embed/${vid}?enablejsapi=1&rel=0&showinfo=0&autoplay=0&mute=1&controls=0&modestbranding=1`;
                this.classList.remove("playing");
              }
            });

            // --- click: open modal ---
            card.addEventListener("click", function (e) {
              const vid = this.dataset.videoId;
              const title = this.dataset.title;
              const views = this.dataset.views;
              openModal(vid, title, views);
            });

            wrapper.appendChild(card);
          });
        }

        // ----- auto-scroll control -----
        function pauseScroll(pause) {
          if (pause) {
            isHovering = true;
            if (scrollInterval) {
              clearInterval(scrollInterval);
              scrollInterval = null;
            }
          } else {
            isHovering = false;
            if (!scrollInterval) {
              setTimeout(() => {
                if (!isHovering && !scrollInterval) {
                  startAutoScroll();
                }
              }, 300);
            }
          }
        }

        function startAutoScroll() {
          if (scrollInterval) return;
          scrollInterval = setInterval(() => {
            if (isHovering) return;
            if (!wrapper) return;
            wrapper.scrollLeft += 1.4;
            const maxScroll = wrapper.scrollWidth - wrapper.clientWidth;
            if (wrapper.scrollLeft >= maxScroll - 6) {
              wrapper.scrollLeft = 0;
            }
          }, 20);
        }

        // ----- modal -----
        function openModal(videoId, title, views) {
          const overlay = document.getElementById("modalOverlay");
          const iframe = document.getElementById("modalIframe");
          const titleEl = document.getElementById("modalTitle");
          const descEl = document.getElementById("modalDesc");

          iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&controls=1&showinfo=1&modestbranding=1`;
          titleEl.textContent = title || "Stock video";
          descEl.textContent = `Trading insight · ${views || "popular"} views worldwide`;

          overlay.classList.add("active");
          document.body.style.overflow = "hidden";
          pauseScroll(true);
        }

        function closeModal() {
          const overlay = document.getElementById("modalOverlay");
          const iframe = document.getElementById("modalIframe");
          overlay.classList.remove("active");
          iframe.src = "";
          document.body.style.overflow = "";
          pauseScroll(false);
        }

        // ----- modal events -----
        document
          .getElementById("modalCloseBtn")
          .addEventListener("click", closeModal);
        document
          .getElementById("modalOverlay")
          .addEventListener("click", function (e) {
            if (e.target === this) closeModal();
          });
        document.addEventListener("keydown", function (e) {
          if (
            e.key === "Escape" &&
            document.getElementById("modalOverlay").classList.contains("active")
          ) {
            closeModal();
          }
        });

        // ----- init -----
        buildCards();
        setTimeout(() => {
          startAutoScroll();
        }, 400);

        window.addEventListener("beforeunload", function () {
          if (scrollInterval) clearInterval(scrollInterval);
        });
      })();
    </script>
  </body>
</html>
